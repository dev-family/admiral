name: CI
on:
    push:
        branches:
            - master
    pull_request:
    workflow_dispatch:

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'yarn'
            - name: Install Dependencies
              run: yarn install --frozen-lockfile
            - name: Lint
              run: yarn lint
            - name: Typecheck
              run: yarn tsc
            - name: Test
              run: yarn test
            - name: Build Library
              run: yarn build:lib
            - name: Ensure committed lib/ is fresh
              run: git diff --exit-code -- lib || (echo "lib/ is stale — run 'yarn build:lib' and commit the result" && exit 1)

    deploy:
        needs: check
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        runs-on: ubuntu-latest
        env:
            DEPLOY_PATH: /root/app/other-projects/admiral/
            BUILD_SCRIPT_OUTPUT: dist
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'yarn'
            - name: Install Dependencies
              run: yarn install --frozen-lockfile
            - name: Build Application
              run: yarn build
            - name: Deploy to Server
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.DEPLOY_SERVER_HOST }}
                  port: ${{ secrets.DEPLOY_SERVER_PORT }}
                  username: ${{ secrets.DEPLOY_SERVER_USERNAME }}
                  key: ${{ secrets.DEPLOY_SERVER_KEY }}
                  source: ${{ env.BUILD_SCRIPT_OUTPUT }}
                  target: ${{ env.DEPLOY_PATH }}
                  strip_components: 1
            - name: Done
              run: echo "Deployed at https://admiral.dev.family"
