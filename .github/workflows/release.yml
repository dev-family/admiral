name: Release
on:
    push:
        tags:
            - 'v*'

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'yarn'
            - name: Install Dependencies
              run: yarn install --frozen-lockfile
            - name: Lint
              run: yarn lint
            - name: Typecheck
              run: yarn tsc
            - name: Test
              run: yarn test
            - name: Build Library
              run: yarn build:lib
            - name: Check package types
              run: npx attw --pack . --profile esm-only --exclude-entrypoints ./style.css
            - name: Consumer smoke test of packed tarball (no peer auto-install)
              run: node scripts/pack-smoke.mjs
            - name: Update npm (OIDC trusted publishing needs npm >= 11.5.1, Node 22 bundles 10.x)
              run: npm install -g npm@latest
            - name: Publish to npm (OIDC trusted publishing, no token)
              run: npm publish --provenance --access public
